name: "spike - Investigacao tecnica"
description: "Investigação técnica com timebox definido para responder uma pergunta específica."
labels: ["spike"]
body:
  - type: markdown
    attributes:
      value: |
        ## Spike — Investigação técnica com timebox
        Use este template para investigações técnicas cujo objetivo é **responder uma pergunta**,
        não entregar código em produção.

        O resultado de um spike é: decisão documentada, ADR criado ou descartado, e uma issue
        de implementação criada com o escopo definido.

        Referência completa: `docs/process/definition-of-done.md`

  - type: input
    id: epic
    attributes:
      label: "Épico relacionado"
      description: "Ex: EPIC-04 — Modernização do runtime"
      placeholder: "EPIC-XX — Nome do épico"
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: "Pergunta a ser respondida"
      description: "A pergunta clara e objetiva que este spike deve responder."
      placeholder: |
        Ex: O DGS Framework é compatível com Spring Boot 4.0.3?
        Se não, qual é a alternativa mais adequada para GraphQL neste projeto?
    validations:
      required: true

  - type: input
    id: timebox
    attributes:
      label: "Timebox"
      description: "Tempo máximo dedicado a esta investigação. Ao esgotar, documenta o que foi descoberto e decide."
      placeholder: "Ex: 4 horas | 1 dia | 2 dias"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Contexto e motivação"
      description: "Por que esta investigação é necessária agora? Qual decisão ela desbloqueia?"
      placeholder: |
        Contexto: ...
        Decisão que será desbloqueada: ...
    validations:
      required: true

  - type: textarea
    id: success_criteria
    attributes:
      label: "Critério de sucesso"
      description: "Como sabemos que o spike terminou — independentemente da resposta encontrada."
      placeholder: |
        - [ ] Pergunta respondida com evidências (POC, leitura de docs, teste isolado)
        - [ ] Decisão documentada (ADR criado ou descartado com justificativa)
        - [ ] Issue de implementação criada com escopo definido (se aplicável)
    validations:
      required: true

  - type: textarea
    id: dor
    attributes:
      label: "Definition of Ready (DoR)"
      value: |
        - [ ] Pergunta clara e objetiva definida
        - [ ] Timebox acordado com o time
        - [ ] Contexto e motivação documentados
        - [ ] Issue criada no GitHub antes de iniciar a investigação
    validations:
      required: true

  - type: textarea
    id: dod
    attributes:
      label: "Definition of Done (DoD)"
      value: |
        - [ ] Pergunta respondida com evidências documentadas
        - [ ] ADR criado ou atualizado com a decisão
        - [ ] Issue de implementação criada (se a resposta gerar trabalho)
        - [ ] Timebox respeitado — decisão tomada ao esgotar o tempo
        - [ ] Conventional Commit com closes #XX ou refs #XX
        - [ ] PR aberta com link para esta issue
        - [ ] Prompts usados documentados no Coda
        - [ ] Referência completa: docs/process/definition-of-done.md
    validations:
      required: true

  - type: input
    id: coda
    attributes:
      label: "Prompts e skills — Coda"
      description: "Link ou nome do documento no Coda com os prompts usados nesta issue."
      placeholder: "https://coda.io/... ou 'Coda > RealWorld > Prompts > spike/...'"
    validations:
      required: true

  - type: input
    id: pr
    attributes:
      label: "PR relacionada"
      description: "Preencher após abrir a PR."
      placeholder: "#XX"
    validations:
      required: false
