name: Java CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request:
    branches:
      - '**'

jobs:
  secret-scan:
    name: Scan for secrets (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch for diff
        run: |
          if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
            git fetch origin ${{ github.event.repository.default_branch }}:${{ github.event.repository.default_branch }}
          fi
      - uses: trufflesecurity/trufflehog@v3.95.5
        with:
          path: ./
          base: ${{ github.ref_name == github.event.repository.default_branch && 'HEAD~1' || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unknown

  build:
    needs: secret-scan

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: '25'
    - uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Generate JWT secret for tests
      run: echo "JWT_SECRET=$(openssl rand -base64 64 | tr -d '\n')" >> $GITHUB_ENV
    - name: Test with Gradle
      run: ./gradlew clean test

  validate-startup:
    name: Validate Docker Compose startup
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install script dependencies
        run: pip install -r requirements-scripts.txt

      - name: Generate secrets for Docker Compose
        run: |
          echo "JWT_SECRET=$(openssl rand -base64 64 | tr -d '\n')" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=$(openssl rand -base64 32 | tr -d '\n')" >> $GITHUB_ENV

      - name: Create .env file for Docker Compose
        run: |
          echo "JWT_SECRET=${JWT_SECRET}" > .env
          echo "JWT_SESSION_TIME=604800" >> .env
          echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> .env
          echo "POSTGRES_DB=realworld" >> .env
          echo "POSTGRES_USER=postgres" >> .env
          echo "SPRING_PROFILES_ACTIVE=dev" >> .env

      - name: Validate Docker Compose startup and shutdown
        run: python3 scripts/validate_startup.py

      - name: Cleanup Docker Compose
        if: always()
        run: docker compose down --volumes --remove-orphans
