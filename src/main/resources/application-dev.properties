# ============================================================================
# Profile: dev (desenvolvimento local)
# Ativar com: SPRING_PROFILES_ACTIVE=dev
# ============================================================================

# JWT session: 7 dias (604800 segundos) — sessao longa para desenvolvimento
# Sobrescreve o padrao base de 86400 (24h) do application.properties
# Pode ser sobrescrito pela variavel de ambiente JWT_SESSION_TIME
jwt.sessionTime=${JWT_SESSION_TIME:604800}
