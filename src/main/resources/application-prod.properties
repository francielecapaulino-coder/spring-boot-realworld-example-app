# ============================================================================
# Profile: prod (producao)
# Ativar com: SPRING_PROFILES_ACTIVE=prod
# ============================================================================

# JWT session: 1 hora (3600 segundos) — sessao curta para seguranca
# Sobrescreve o padrao base de 86400 (24h) do application.properties
# Pode ser sobrescrito pela variavel de ambiente JWT_SESSION_TIME
jwt.sessionTime=${JWT_SESSION_TIME:3600}
