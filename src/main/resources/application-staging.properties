# ============================================================================
# Profile: staging (ambiente de homologacao)
# Ativar com: SPRING_PROFILES_ACTIVE=staging
# ============================================================================

# JWT session: 24 horas (86400 segundos) — igual ao padrao base
# Explicito aqui para documentar a intencao por ambiente
# Pode ser sobrescrito pela variavel de ambiente JWT_SESSION_TIME
jwt.sessionTime=${JWT_SESSION_TIME:86400}
