spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:realworld}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:realworld}
spring.datasource.password=${POSTGRES_PASSWORD:realworld}
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true

image.default=https://static.productionready.io/images/smiley-cyrus.jpg

# JWT - chave secreta para assinatura de tokens
# Obrigatoria: a aplicacao NAO inicia sem esta variavel
# Configurar com: export JWT_SECRET=$(openssl rand -base64 64)
jwt.secret=${JWT_SECRET}

# Tempo de expiracao dos tokens JWT em segundos
# Opcional: usa 86400 (24h) como padrao se nao definida
# Exemplos: dev=604800 (7d), staging=86400 (24h), prod=3600 (1h)
jwt.sessionTime=${JWT_SESSION_TIME:86400}

# Spring Actuator -- endpoints expostos para healthcheck e observabilidade
# /actuator/health : usado pelo Docker Compose como healthcheck do servico app (US-03.04)
# /actuator/prometheus : consumido pelo Prometheus na stack LGTM (US-03.04)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Metadados da aplicacao expostos em /actuator/info
info.app.name=realworld
info.app.description=RealWorld Platform Modernization
info.app.version=1.0.0

# Virtual Threads (Java 21+ / Project Loom) -- US-04.08
# Habilita virtual threads para o servlet container e executores gerenciados
# pelo Spring Boot, melhorando a vazao de I/O sem reescrita de codigo.
spring.threads.virtual.enabled=true

# Flyway -- US-05.01 (explicitamente habilitado para garantir ordem com Hibernate)
# Em Spring Boot 4, a auto-detecao via classpath pode nao ativar o FlywayMigrationInitializer
# antes do EntityManagerFactory quando ddl-auto=validate; o flag explicito evita a corrida.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Spring Data JPA + Hibernate -- US-05.01
# ddl-auto=validate: Flyway gerencia schema; Hibernate apenas valida
# Nunca usar create/create-drop/update em producao
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# springdoc-openapi -- documents the current REST API contract (US-86)
# OpenAPI JSON: /v3/api-docs
# Swagger UI:   /swagger-ui/index.html (and /swagger-ui.html redirects to it)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
# Exclude the GraphQL controller from the OpenAPI document (REST-only contract).
springdoc.packagesToScan=io.spring.api
