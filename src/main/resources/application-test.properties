# Testcontainers JDBC URL — sobe container PostgreSQL 16 automaticamente durante os testes
# Nao requer Docker Compose nem PostgreSQL instalado localmente
# Driver do Testcontainers gerencia o ciclo de vida do container
spring.datasource.url=jdbc:tc:postgresql:16:///realworld
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# Flyway deve rodar as migrations no container de teste
spring.flyway.enabled=true
