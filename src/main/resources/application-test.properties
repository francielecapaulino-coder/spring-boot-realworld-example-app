# Testcontainers JDBC URL Ś sobe container PostgreSQL 16 automaticamente durante os testes
# Nao requer Docker Compose nem PostgreSQL instalado localmente
# Driver do Testcontainers gerencia o ciclo de vida do container
spring.datasource.url=jdbc:tc:postgresql:16:///realworld
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# Flyway deve rodar as migrations no container de teste
spring.flyway.enabled=true

# JWT Ś valor estatico apenas para perfil de teste (64+ bytes exigidos pelo HS512 do JJWT 0.12)
# Nao e segredo real; sobrescreve ${JWT_SECRET} de application.properties durante os testes
jwt.secret=test-only-jwt-secret-key-not-used-outside-of-test-profile-min-64-bytes-for-hs512
jwt.sessionTime=86400

# Limita o pool de conex§es por @SpringBootTest context para evitar
# "FATAL: sorry, too many clients already" no PostgreSQL do Testcontainers
# quando m·ltiplos contextos de teste rodam em sequĻncia.
spring.datasource.hikari.maximum-pool-size=3
