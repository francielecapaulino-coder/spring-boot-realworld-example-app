# ============================================================================
# docker-compose.yml — RealWorld Platform Modernization (US-03.04)
# ============================================================================
#
# Orquestra a stack de desenvolvimento completa:
#   app + postgres + prometheus + loki + tempo + grafana
#
# Uso:
#   1. cp .env.example .env  &&  preencha JWT_SECRET e POSTGRES_PASSWORD
#   2. docker compose up -d
#   3. Aguarde ~60s   ->   docker compose ps   (6 serviços healthy/running)
#   4. curl http://localhost:8080/actuator/health   ->   {"status":"UP"}
#   5. docker compose down
#
# Referências:
#   - ADR-006: JWT_SECRET e JWT_SESSION_TIME injetados pelo compose (.env)
#   - US-03.01 (Dockerfile), US-03.02 (Actuator), US-03.03 (PostgreSQL + Flyway)
#   - As fontes de dados do Grafana são provisionadas em US-03.05
# ============================================================================

services:
  app:
    build: .
    container_name: realworld-app
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_SESSION_TIME: ${JWT_SESSION_TIME:-604800}
      SPRING_PROFILES_ACTIVE: dev
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-realworld}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    # A imagem runtime é jre-alpine (sem curl); usa o wget do busybox.
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - realworld
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: realworld-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-realworld}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realworld
    restart: unless-stopped

  # prometheus/loki/tempo usam imagens distroless (sem shell nem wget/curl),
  # portanto não definem healthcheck — o Grafana depende delas via service_started.
  prometheus:
    image: prom/prometheus:latest
    container_name: realworld-prometheus
    ports:
      - "9090:9090"
    networks:
      - realworld
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: realworld-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - realworld
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: realworld-tempo
    ports:
      - "3200:3200"
    command: -target=all -storage.trace.backend=local -storage.trace.local.path=/var/tempo
    networks:
      - realworld
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: realworld-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning automático das fontes de dados (US-03.05)
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - realworld
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:

networks:
  realworld:
    driver: bridge
